version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: evenSteven
      POSTGRES_PASSWORD: evenSteven
      POSTGRES_DB: even_steven
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://evenSteven:evenSteven@postgres:5432/even_steven?sslmode=disable
    ports:
      - "8080:8080"

volumes:
  postgres_data:
